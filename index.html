<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>HBI Dashboard</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">

        <h1>HBI</h1>

        <h2>Heat Burden Intelligence</h2>

        <p class="subtitle">
            South Asia Heat Stress Watch
        </p>

        <div class="card">

            <h3>Top Heat Stress Cities</h3>

            <table>

                    <tr>
                    <th>Rank</th>
                    <th>City</th>
                    <th>Heat Index</th>
                    </tr>

                    <tbody id="heat-table-body">
                    </tbody>

            </table>

        </div>

    </div>

    <script src="script.js"></script>

</body>

</html>
